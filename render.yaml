services:
  - type: web
    name: vidya-mitra-backend
    env: docker
    repo: https://github.com/gandhisiddhi81/Vidya_Mitra_Career_Devlopment_Platform-Backend-.git
    rootDir: .
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://vidya-mitra-frontend.onrender.com

